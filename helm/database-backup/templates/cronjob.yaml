{{- if .Values.config.content }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "database-backup.fullname" . }}
  labels:
    {{- include "database-backup.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.schedule | quote }}
  {{- if .Values.timezone }}
  timeZone: {{ .Values.timezone | quote }}
  {{- end }}
  successfulJobsHistoryLimit: {{ .Values.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.failedJobsHistoryLimit }}
  concurrencyPolicy: {{ .Values.concurrencyPolicy }}
  {{- if .Values.startingDeadlineSeconds }}
  startingDeadlineSeconds: {{ .Values.startingDeadlineSeconds }}
  {{- end }}
  suspend: {{ .Values.suspend }}
  jobTemplate:
    metadata:
      labels:
        {{- include "database-backup.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.backoffLimit }}
      backoffLimit: {{ .Values.backoffLimit }}
      {{- end }}
      {{- if .Values.ttlSecondsAfterFinished }}
      ttlSecondsAfterFinished: {{ .Values.ttlSecondsAfterFinished }}
      {{- end }}
      template:
        metadata:
          labels:
            {{- include "database-backup.selectorLabels" . | nindent 12 }}
          {{- if .Values.podAnnotations }}
          annotations:
            {{- .Values.podAnnotations | toJson | nindent 14 }}
          {{- end }}
        spec:
          restartPolicy: {{ .Values.restartPolicy }}
          serviceAccountName: {{ include "database-backup.serviceAccountName" . }}
          {{- if .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- range .Values.imagePullSecrets }}
            - name: {{ . }}
            {{- end }}
          {{- end }}
          {{- if or .Values.podSecurityContext.runAsNonRoot .Values.podSecurityContext.runAsUser .Values.podSecurityContext.fsGroup }}
          securityContext:
            {{- if .Values.podSecurityContext.runAsNonRoot }}
            runAsNonRoot: {{ .Values.podSecurityContext.runAsNonRoot }}
            {{- end }}
            {{- if .Values.podSecurityContext.runAsUser }}
            runAsUser: {{ .Values.podSecurityContext.runAsUser }}
            {{- end }}
            {{- if .Values.podSecurityContext.fsGroup }}
            fsGroup: {{ .Values.podSecurityContext.fsGroup }}
            {{- end }}
          {{- end }}
          {{- if .Values.nodeSelector }}
          nodeSelector:
            {{- .Values.nodeSelector | toJson | nindent 10 }}
          {{- end }}
          {{- if .Values.affinity }}
          affinity:
            {{- .Values.affinity | toJson | nindent 10 }}
          {{- end }}
          {{- if .Values.tolerations }}
          tolerations:
            {{- .Values.tolerations | toJson | nindent 10 }}
          {{- end }}
          containers:
            - name: {{ .Chart.Name }}
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              # The image entrypoint already launches the bundled backup CLI.
              # Only pass the subcommand arguments here.
              args:
                - run
                - --config
                - /config/backup.yaml
              {{- if .Values.env }}
              env:
                {{- range .Values.env }}
                - name: {{ .name }}
                  {{- if .value }}
                  value: {{ .value | quote }}
                  {{- else if .valueFrom }}
                  valueFrom:
                    {{- if .valueFrom.secretKeyRef }}
                    secretKeyRef:
                      name: {{ .valueFrom.secretKeyRef.name }}
                      key: {{ .valueFrom.secretKeyRef.key }}
                    {{- end }}
                    {{- if .valueFrom.configMapRef }}
                    configMapKeyRef:
                      name: {{ .valueFrom.configMapRef.name }}
                      key: {{ .valueFrom.configMapRef.key }}
                    {{- end }}
                  {{- end }}
                {{- end }}
              {{- end }}
              {{- if .Values.envFrom }}
              envFrom:
                {{- range .Values.envFrom }}
                {{- if .configMapRef }}
                - configMapRef:
                    name: {{ .configMapRef.name }}
                {{- end }}
                {{- if .secretRef }}
                - secretRef:
                    name: {{ .secretRef.name }}
                {{- end }}
                {{- end }}
              {{- end }}
              {{- if .Values.resources.limits }}
              resources:
                limits:
                  cpu: {{ .Values.resources.limits.cpu | default "1000m" }}
                  memory: {{ .Values.resources.limits.memory | default "512Mi" }}
                requests:
                  cpu: {{ .Values.resources.requests.cpu | default "100m" }}
                  memory: {{ .Values.resources.requests.memory | default "128Mi" }}
              {{- end }}
              {{- if .Values.containerSecurityContext.allowPrivilegeEscalation }}
              securityContext:
                allowPrivilegeEscalation: {{ .Values.containerSecurityContext.allowPrivilegeEscalation }}
                {{- if .Values.containerSecurityContext.readOnlyRootFilesystem }}
                readOnlyRootFilesystem: {{ .Values.containerSecurityContext.readOnlyRootFilesystem }}
                {{- end }}
                {{- if .Values.containerSecurityContext.capabilities.drop }}
                capabilities:
                  drop:
                    {{- range .Values.containerSecurityContext.capabilities.drop }}
                    - {{ . }}
                    {{- end }}
                {{- end }}
              {{- end }}
              volumeMounts:
                - name: config
                  mountPath: /config
                  readOnly: true
          volumes:
            - name: config
              configMap:
                name: {{ include "database-backup.fullname" . }}
                items:
                  - key: backup.yaml
                    path: backup.yaml
{{- end }}
