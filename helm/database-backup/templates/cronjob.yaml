{{- if .Values.config.content }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "database-backup.fullname" . }}
  labels:
    {{- include "database-backup.labels" . | nindent 4 }}
{{- with .Values.podAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
{{- end }}
spec:
  schedule: {{ .Values.schedule | quote }}
  timezone: {{ .Values.timezone | quote }}
  successfulJobsHistoryLimit: {{ .Values.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.failedJobsHistoryLimit }}
  concurrencyPolicy: {{ .Values.concurrencyPolicy }}
{{- with .Values.startingDeadlineSeconds }}
  startingDeadlineSeconds: {{ . }}
{{- end }}
  suspend: {{ .Values.suspend }}
  jobTemplate:
    metadata:
      labels:
        {{- include "database-backup.selectorLabels" . | nindent 8 }}
    spec:
{{- if .Values.backoffLimit }}
      backoffLimit: {{ .Values.backoffLimit }}
{{- end }}
{{- if .Values.ttlSecondsAfterFinished }}
      ttlSecondsAfterFinished: {{ .Values.ttlSecondsAfterFinished }}
{{- end }}
      template:
        metadata:
          labels:
            {{- include "database-backup.selectorLabels" . | nindent 12 }}
{{- with .Values.podLabels }}
            {{- toYaml . | nindent 14 }}
{{- end }}
        spec:
          restartPolicy: {{ .Values.restartPolicy }}
          serviceAccountName: {{ include "database-backup.serviceAccountName" . }}
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.podSecurityContext | nindent 12 }}
          {{- with .Values.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 10 }}
          {{- end }}
          {{- with .Values.affinity }}
          affinity:
            {{- toYaml . | nindent 10 }}
          {{- end }}
          {{- with .Values.tolerations }}
          tolerations:
            {{- toYaml . | nindent 8 }}
          {{- end }}
          containers:
            - name: backup
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command:
                - node
                - /app/output/cli/run.js
                - run
                - --config
                - /config/backup.yaml
              {{- if .Values.resources }}
              resources:
                {{- toYaml .Values.resources | nindent 14 }}
              {{- end }}
              securityContext:
                {{- toYaml .Values.containerSecurityContext | nindent 14 }}
              volumeMounts:
                - name: config
                  mountPath: /config
                  readOnly: true
              env:
                {{- range .Values.env }}
                - name: {{ .name }}
                  {{- if .value }}
                  value: {{ .value | quote }}
                  {{- else if .valueFrom }}
                  valueFrom:
                    {{- toYaml .valueFrom | nindent 20 }}
                  {{- end }}
                {{- end }}
              {{- with .Values.envFrom }}
              envFrom:
                {{- toYaml . | nindent 14 }}
              {{- end }}
          volumes:
            - name: config
              configMap:
                name: {{ include "database-backup.fullname" . }}
                items:
                  - key: backup.yaml
                    path: backup.yaml
{{- end }}
