# Default values for database-backup.

image:
  repository: ghcr.io/yinxulai/database-backup
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# CronJob configuration
schedule: "0 2 * * *"
timezone: "UTC"
successfulJobsHistoryLimit: 3
failedJobsHistoryLimit: 3
concurrencyPolicy: Forbid
startingDeadlineSeconds: 300
suspend: false
restartPolicy: OnFailure
backoffLimit: 3
ttlSecondsAfterFinished: ""

# Backup configuration (YAML content)
config:
  content: |
    # apiVersion: backup.taicode/v1
    # kind: BackupGroup
    # metadata:
    #   name: my-backup
    # spec:
    #   source:
    #     type: postgresql
    #     connection:
    #       host: postgres.database.svc.cluster.local
    #       port: 5432
    #       username: postgres
    #       passwordSecretRef:
    #         type: k8s
    #         secretName: postgres-secret
    #         secretKey: password
    #     database: myapp
    #   destination:
    #     type: s3
    #     s3:
    #       endpoint: https://s3.amazonaws.com
    #       region: us-east-1
    #       bucket: my-backups
    #       accessKeySecretRef:
    #         type: k8s
    #         secretName: aws-secret
    #         secretKey: access-key-id
    #       secretKeySecretRef:
    #         type: k8s
    #         secretName: aws-secret
    #         secretKey: secret-access-key

# Environment variables
env: []
# - name: AWS_ACCESS_KEY_ID
#   valueFrom:
#     secretKeyRef:
#       name: aws-secret
#       key: access-key-id
# - name: AWS_SECRET_ACCESS_KEY
#   valueFrom:
#     secretKeyRef:
#       name: aws-secret
#       key: secret-access-key

envFrom: []
# - configMapRef:
#     name: my-configmap

resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

podAnnotations: {}
podLabels: {}
