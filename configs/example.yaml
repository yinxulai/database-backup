# Database Backup 配置示例
#
# 使用方法:
#   backup run --config configs/example.yaml
#
# 环境变量（推荐生产环境使用）:
#   DB_PASSWORD=xxx
#   AWS_ACCESS_KEY_ID=xxx
#   AWS_SECRET_ACCESS_KEY=xxx
#
# 本地测试也支持直接写明文，例如：
#   password: your-password
#   accessKeyId: your-key
#   secretAccessKey: your-secret

name: example-postgres-backup

# 来源配置
source:
  type: postgresql
  connection:
    host: localhost
    port: 5432
    username: postgres
    # 方式一：直接写明文（适合本地测试）
    # password: your-password

    # 方式二：使用环境变量（推荐生产环境）
    password: ${DB_PASSWORD}
    ssl: false
  database: myapp
  # 可选：指定表列表；支持 Schema.TableName；省略或空数组 = 备份整个数据库
  # 不要直接照抄下面示例到别的数据库，否则如果表不存在，会得到空文件。
  # tables:
  #   - public.users
  #   - audit.login_events

# 目标配置
destination:
  type: s3
  s3:
    endpoint: https://s3.amazonaws.com
    region: us-east-1
    bucket: my-backups
    accessKeyId: ${AWS_ACCESS_KEY_ID}
    secretAccessKey: ${AWS_SECRET_ACCESS_KEY}
    # 固定路径前缀；实际对象路径会自动生成为：backups/prod/postgresql/myapp/YYYY/MM/DD/<task>-HH-mm-ss.sql.gz
    pathPrefix: "backups/prod"

# 调度配置（可选，不填 = 手动执行）
# schedule:
#   enabled: true
#   cron: "0 2 * * *"
#   timezone: "Asia/Shanghai"

# 保留策略（可选）
# retention:
#   retentionDays: 7
